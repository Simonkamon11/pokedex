<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex</title>
    <link rel="icon" href="images/pokeball.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Single:wght@100..900&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body id="body">
    <h1 id="title" class="text">Pokédex</h1>
    <h2 id="owner" class="text">by Simonkamon11</h2>
    <input type="text" id="pokemonInput" placeholder="Enter Pokémon name">
    <button onclick="fetchData()" id="fetch-button" class="clickable">Fetch data</button><br>
    <div id="fetchText-container">
        <p id="fetchText" class="text"></p>
    </div>

    <div id="name-type-container">
        <h1 id="pokemonName" class="text"></h1>
        <img src="" alt="type1" id="type1" style="display: none;">
        <img src="" alt="type2" id="type2" style="display: none;">
    </div>
    <h2 id="pokemonSpecies" class="text"></h2>
    <div id="pokemonImages-container">
        <img src="" alt="Pokémon Sprite" id="pokemonSprite" style="display: none;" class="pokemonImages">
        <div class="corner-icon-container">
            <img src="" alt="Pokémon Shiny Sprite" id="shinySprite" style="display: none;" class="pokemonImages"> 
            <img src="images/shiny_sparkles.png" alt="shiny sparkles" id="shiny-sparkles" class="corner-icon" style="display: none;">
        </div>
    </div>

    <h2 id="pokedexNr" class="text"></h2>

    <h2 class="stats" id="hpStat"></h2>
    <h2 class="stats" id="atkStat"></h2>
    <h2 class="stats" id="defStat"></h2>
    <h2 class="stats" id="spAtkStat"></h2>
    <h2 class="stats" id="spDefStat"></h2>
    <h2 class="stats" id="speedStat"></h2>

    <h2 id="baseStatTotal" class="text"></h2>

    <h2 id="damageMultipliers" class="title-text"></h2>
    <div id="damage-multipliers-container"></div>

    <h2 id="genderDifferencesText" class="title-text"></h2>

    <div id="gender-container">
        <div class="corner-icon-container">
            <img src="" alt="Pokémon Male Sprite" id="maleSprite" style="display: none;" class="pokemonImages"> 
            <img src="images/male.png" alt="male icon" id="maleIcon" class="corner-icon" style="display: none;">
        </div>
        <div class="corner-icon-container">
            <img src="" alt="Pokémon Female Sprite" id="femaleSprite" style="display: none;" class="pokemonImages">
            <img src="images/female.png" alt="female icon" id="femaleIcon" class="corner-icon" style="display: none;">
        </div>
    </div>

    <h2 id="abilitiesText"></h2>
    <div id="abilities-container"></div>

    <h2 id="height" class="text"></h2>
    <h2 id="weight" class="text"></h2>

    <h2 id="evolvesFromText" class="title-text"></h2>
    <h2 id="preEvoText" class="clickable"></h2>

    <script src="index.js"></script>
</html>
